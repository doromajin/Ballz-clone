<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>DinoBallz Clone</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: #0f172a; color: #fff;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
    }
    #root {
      width: 100%; height: 100vh; display: flex;
      justify-content: center; align-items: center;
      background: #020617;
    }
    .game-container {
      position: relative; width: 100%; max-width: 500px;
      height: 100%; max-height: 100vh; display: flex;
      justify-content: center; align-items: center; user-select: none;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }
    .game-canvas {
      width: 100%; height: auto; 
      max-width: 100%; max-height: 100vh;
      aspect-ratio: 7 / 10;
      background-color: #0f172a;
      touch-action: none;
    }
    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%;
      display: flex; justify-content: space-between; align-items: center; 
      padding: calc(max(20px, env(safe-area-inset-top)) + 15px) 20px 15px 20px;
      pointer-events: none;
    }
    .top-bar {
      display: flex; width: 100%; justify-content: space-between;
      align-items: center;
    }
    .scores {
      display: flex; gap: 40px;
    }
    .stat-box { display: flex; flex-direction: column; align-items: flex-start; }
    .stat-label { font-size: 0.8rem; color: #94a3b8; font-weight: 900; letter-spacing: 0.05em; text-shadow: 0 1px 2px #000; }
    .stat-value { font-size: 2.2rem; color: #fff; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.8); line-height: 1.1; }
    
    .game-over-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(2, 6, 23, 0.9); backdrop-filter: blur(8px);
      display: none; flex-direction: column; justify-content: center;
      align-items: center; z-index: 10;
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .game-over-overlay.active { display: flex; }
    .game-over-title {
      font-size: 4rem; font-weight: 900; margin-bottom: 1rem;
      background: linear-gradient(to right, #60a5fa, #c084fc, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 8px rgba(192, 132, 252, 0.5));
    }
    
    .character-select {
      background: rgba(15, 23, 42, 0.8); border: 2px solid #334155;
      border-radius: 16px; padding: 20px; width: 90%; max-width: 400px;
      margin-bottom: 2rem; text-align: center;
    }
    .char-buttons {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    }
    .char-btn {
      background: #1e293b; color: #cbd5e1; border: 2px solid #475569;
      padding: 10px 15px; border-radius: 8px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
    }
    .char-btn.active {
      background: #0ea5e9; color: #fff; border-color: #38bdf8;
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.5); transform: scale(1.05);
    }
    
    .retry-button {
      background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white;
      border: none; padding: 1rem 3.5rem; font-size: 1.8rem; font-weight: 900;
      letter-spacing: 0.1em; border-radius: 9999px; cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .retry-button:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.5); }
    .retry-button:active { transform: translateY(2px) scale(0.95); }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="game-container">
      <canvas id="gameCanvas" width="700" height="1000" class="game-canvas"></canvas>
      <div class="ui-layer">
        <div class="top-bar">
          <div class="scores">
            <div class="stat-box">
              <span class="stat-label">SCORE</span>
              <span class="stat-value" id="scoreText">1</span>
            </div>
            </div>
            <div class="stat-box">
              <span class="stat-label">HIGH SCORE</span>
              <span class="stat-value" id="highScoreText" style="color: #facc15;">1</span>
            </div>
            <div class="stat-box" style="margin-left: 10px;">
              <span class="stat-label" style="color: #facc15; text-shadow: 0 1px 2px #b45309;">COINS</span>
              <span class="stat-value" id="topCoinText" style="color: #fef08a;">0</span>
            </div>
          </div>
          <button id="menuBtn" style="pointer-events: auto; background: rgba(0,0,0,0.6); border: 2px solid #334155; color: #fff; font-weight: bold; border-radius: 12px; padding: 10px 18px; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            MENU
          </button>
        </div>
      </div>
      
      <!-- Start / Game Over Screen -->
      <div class="game-over-overlay active" id="gameOverOverlay">
        <h2 class="game-over-title" id="overlayTitle">DINO BALLZ</h2>
        
        <div style="margin: 1.5rem 0;">
          <input type="text" id="usernameInput" maxlength="12" placeholder="Player Name" style="background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 0.5rem 1rem; color: #fff; font-size: 1.2rem; text-align: center; width: 80%; max-width: 200px; outline: none; font-family: 'Nunito', sans-serif;">
        </div>

        <button class="retry-button" id="rankingBtn" style="background: linear-gradient(135deg, #a855f7, #9333ea); box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.4); margin-bottom: 1rem; font-size: 1.2rem; padding: 1rem;">RANKING</button>
        <button class="retry-button" id="continueBtn" style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4); margin-bottom: 1rem; font-size: 1.2rem; padding: 1rem; display: none;">CONTINUE</button>
        <button class="retry-button" id="retryButton">START</button>
      </div>

      <!-- Pause Overlay -->
      <div class="game-over-overlay" id="pauseOverlay">
        <h2 class="game-over-title" style="background: linear-gradient(to right, #34d399, #3b82f6); -webkit-background-clip: text; font-size: 3.5rem;">PAUSED</h2>
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; width: 80%; max-width: 300px;">
            <button class="retry-button" id="resumeBtn" style="padding: 1rem; font-size: 1.2rem; border-radius: 12px;">RESUME</button>
            <button class="retry-button" id="openShopBtn" style="background: linear-gradient(135deg, #facc15, #eab308); color: #000; box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.4); padding: 1rem; font-size: 1.2rem; border-radius: 12px;">SHOP / UPGRADES</button>
            <button class="retry-button" id="quitBtn" style="background: linear-gradient(135deg, #f43f5e, #e11d48); box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.4); padding: 1rem; font-size: 1.2rem; border-radius: 12px;">HOME</button>
        </div>
      </div>

      <!-- Shop Overlay -->
      <div class="game-over-overlay" id="shopOverlay" style="overflow-y: auto; padding-top: 2rem;">
        <h2 class="game-over-title" style="background: linear-gradient(to right, #facc15, #f59e0b); -webkit-background-clip: text; font-size: 3rem;">SHOP</h2>
        
        <div style="margin: 0.5rem 0 1.5rem 0; font-size: 1.5rem; font-weight: bold; color: #fff;">
          Coins: <span id="shopCoins" style="color: #facc15;">0</span>
        </div>
        
        <!-- Base Damage -->
        <div style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; width: 85%; max-width: 320px; text-align: center; margin-bottom: 1rem; border: 2px solid rgba(250,204,21,0.3);">
            <div style="font-size: 1rem; margin-bottom: 0.5rem; color: #cbd5e1; font-weight: bold;">BASE DAMAGE (Max 10)</div>
            <div style="font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; color: #38bdf8;">Lv. <span id="shopBaseDamage">1</span></div>
            <button class="retry-button" id="upgradeBtn" style="padding: 0.8rem; width: 100%; font-size: 1.1rem; border-radius: 12px; background: linear-gradient(135deg, #facc15, #eab308); color: #000;">
                UPGRADE (<span id="upgradeCost">100</span>)
            </button>
        </div>

        <!-- Explosion Damage -->
        <div style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; width: 85%; max-width: 320px; text-align: center; margin-bottom: 1rem; border: 2px solid rgba(248,113,113,0.3);">
            <div style="font-size: 1rem; margin-bottom: 0.5rem; color: #fca5a5; font-weight: bold;">EXPLOSION DMG x10 (1st hit only, Max 10)</div>
            <div style="font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; color: #f87171;">Lv. <span id="shopExplosion">0</span></div>
            <button class="retry-button" id="upgradeExplosionBtn" style="padding: 0.8rem; width: 100%; font-size: 1.1rem; border-radius: 12px; background: linear-gradient(135deg, #f87171, #dc2626); color: #fff;">
                UPGRADE (<span id="costExplosion">150</span>)
            </button>
        </div>

        <!-- Penetration -->
        <div style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; width: 85%; max-width: 320px; text-align: center; margin-bottom: 1rem; border: 2px solid rgba(192,132,252,0.3);">
            <div style="font-size: 1rem; margin-bottom: 0.5rem; color: #d8b4fe; font-weight: bold;">PENETRATE (1st hit only, Max 1)</div>
            <div style="font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; color: #c084fc;">Lv. <span id="shopPenetration">0</span></div>
            <button class="retry-button" id="upgradePenetrationBtn" style="padding: 0.8rem; width: 100%; font-size: 1.1rem; border-radius: 12px; background: linear-gradient(135deg, #c084fc, #9333ea); color: #fff;">
                UPGRADE (<span id="costPenetration">200</span>)
            </button>
        </div>

        <!-- Main Balls -->
        <div style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; width: 85%; max-width: 320px; text-align: center; margin-bottom: 1.5rem; border: 2px solid rgba(52,211,153,0.3);">
            <div style="font-size: 1rem; margin-bottom: 0.5rem; color: #6ee7b7; font-weight: bold;">MAIN BALLS (Max 5)</div>
            <div style="font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; color: #34d399;">Lv. <span id="shopMainBalls">1</span></div>
            <button class="retry-button" id="upgradeMainBallsBtn" style="padding: 0.8rem; width: 100%; font-size: 1.1rem; border-radius: 12px; background: linear-gradient(135deg, #34d399, #059669); color: #fff;">
                UPGRADE (<span id="costMainBalls">200</span>)
            </button>
        </div>

        <button class="retry-button" id="closeShopBtn" style="background: linear-gradient(135deg, #64748b, #475569); box-shadow: 0 10px 15px -3px rgba(100, 116, 139, 0.4); padding: 1rem; width: 80%; max-width: 300px; font-size: 1.2rem; border-radius: 12px; margin-bottom: 2rem;">CLOSE</button>
      </div>

      <!-- Ranking Overlay -->
      <div class="game-over-overlay" id="rankingOverlay" style="justify-content: flex-start; padding-top: 4rem;">
        <h2 class="game-over-title" style="background: linear-gradient(to right, #facc15, #f59e0b); -webkit-background-clip: text; font-size: 3rem; margin-bottom: 1rem;">LEADERBOARD</h2>
        
        <div id="rankingList" style="width: 90%; max-width: 400px; height: 60%; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 16px; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1);">
            <!-- Ranking items will be injected here -->
        </div>

        <button class="retry-button" id="closeRankingBtn" style="padding: 1rem 3rem; font-size: 1.2rem; border-radius: 12px; width: auto;">BACK</button>
      </div>

      <!-- Ability Selection Overlay -->
      <div class="game-over-overlay" id="abilityOverlay" style="justify-content: center; padding: 2rem;">
        <h2 class="game-over-title" style="background: linear-gradient(to right, #60a5fa, #3b82f6); -webkit-background-clip: text; font-size: 2.5rem; margin-bottom: 0.5rem; line-height: 1.2;">
          BOSS DEFEATED!
        </h2>
        <p style="color: #cbd5e1; font-size: 1.2rem; margin-bottom: 2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Choose a temporary ability</p>
        
        <div id="abilityChoices" style="display: flex; flex-direction: column; gap: 1rem; width: 90%; max-width: 400px; margin-bottom: 2rem;">
            <!-- Ability buttons injected here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const storage = {
      getItem: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
      setItem: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} },
      removeItem: (key) => { try { localStorage.removeItem(key); } catch(e) {} }
    };

    const LOGICAL_WIDTH = 700;
    const LOGICAL_HEIGHT = 1000;
    const FLOOR_Y = LOGICAL_HEIGHT - 35; // Physical floor at dino mouth
    const DOTTED_LINE_Y = LOGICAL_HEIGHT - 100; // Visual dotted line

    const getClampedAimDir = (startX, targetX, targetY) => {
        let dx = targetX - startX;
        let dy = targetY - FLOOR_Y;
        let angle = Math.atan2(dy, dx);
        
        // Limit angles using DOTTED_LINE_Y intersection with side walls
        const dyLimit = DOTTED_LINE_Y - FLOOR_Y; // -75
        const minAngleRight = Math.atan2(dyLimit, LOGICAL_WIDTH - startX);
        const minAngleLeft = Math.atan2(dyLimit, 0 - startX);
        
        if (angle > 0 || angle > minAngleRight) {
            angle = dx >= 0 ? minAngleRight : minAngleLeft;
        } else if (angle < minAngleLeft) {
            angle = minAngleLeft;
        }

        
        return {
            dirX: Math.cos(angle),
            dirY: Math.sin(angle),
            dx, dy
        };
    };

    const GRID_COLS = 7;
    const GRID_ROWS = 10;
    const BLOCK_SIZE = LOGICAL_WIDTH / GRID_COLS;
    const BALL_RADIUS = 10;
    const BALL_SPEED = 2000;
    const SHOOT_DELAY = 0.05;

    let highScore = storage.getItem('dinoHighScore') || 1;

    const generateRow = (row, score) => {
      const blocks = [];
      const items = [];
      
      if (score > 0 && score % 50 === 0) {
          let bossType = 'boss';
          let shield = null;
          
          if (score % 500 === 0) {
              bossType = 'boss_muddy';
          } else if (score >= 150) {
              bossType = Math.random() < 0.5 ? 'boss_iron' : 'boss';
              if (bossType === 'boss') shield = ['top', 'right', 'bottom', 'left'][Math.floor(Math.random() * 4)];
          } else if (score >= 100) {
              shield = ['top', 'right', 'bottom', 'left'][Math.floor(Math.random() * 4)];
          }

           let bossHp = 0;
           if (score <= 100) {
               bossHp = 1000 + score * 20; 
           } else {
               bossHp = 1000 + score * 20 + Math.pow((score - 100) / 50, 2.5) * 2000;
           }
           
           if (bossType === 'boss_muddy') {
               if (score <= 100) bossHp = 5000 + score * 50;
               else bossHp = 5000 + score * 50 + Math.pow((score - 100) / 50, 2.5) * 8000;
           }
           bossHp = Math.floor(bossHp);

          blocks.push({
              id: Math.random().toString(36).substring(7),
              col: 2,
              row,
              hp: bossHp,
              maxHp: bossHp,
              type: bossType,
              shield: shield,
              shape: 'square',
              width: 3,
              is100Boss: (score % 100 === 0),
              isTransparent: false,
              hitTimer: 0
          });
          return { blocks, items };
      }
      
      let blockCols = [];
      for (let c = 0; c < GRID_COLS; c++) {
         if (Math.random() > 0.5) blockCols.push(c);
      }
      if (blockCols.length === 0) {
         blockCols.push(Math.floor(Math.random() * GRID_COLS));
      }

      let addBallCount = 0;
      for (let c = 0; c < GRID_COLS; c++) {
        if (blockCols.includes(c)) {
          let baseHp = 1;
          if (score <= 100) {
              baseHp = Math.ceil(score * 0.8) + Math.floor(Math.random() * score * 0.4);
          } else {
              baseHp = Math.ceil(score * 1.5) + Math.floor(Math.random() * score * 0.8) + Math.floor(Math.pow((score - 100) / 50, 2) * 50);
          }
          if (baseHp < 1) baseHp = 1;
          const hp = baseHp;
          let type = 'normal';
          let shape = 'square';
          let shield = null;

          const typeRand = Math.random();
          if (score > 10) {
              if (typeRand < 0.05) type = 'shield';
              else if (typeRand < 0.10) type = 'ghost';
              else if (typeRand < 0.15) type = 'muddy';
          }

          if (score >= 200 && Math.random() < 0.05) {
              type = 'iron';
          }

          if (type === 'iron' || type === 'shield') {
              shape = 'square'; // Force square for iron and shield
          } else if (Math.random() < 0.20) {
              const shapes = ['triangle_tl', 'triangle_tr', 'triangle_bl', 'triangle_br'];
              shape = shapes[Math.floor(Math.random() * shapes.length)];
          }

          let actualHp = hp;
          if (type === 'iron') {
              actualHp = 700 + Math.floor(Math.random() * 300);
          }
          
          if (type === 'shield') {
              const sides = ['top', 'right', 'bottom', 'left'];
              shield = sides[Math.floor(Math.random() * sides.length)];
          }

          blocks.push({ id: Math.random().toString(36).substring(7), col: c, row, hp: actualHp, maxHp: actualHp, type, shape, shield, isTransparent: false, hitTimer: 0 });
        } else if (Math.random() < 0.25) { 
          let type = 'add_ball';
          const itemRand = Math.random();
          if (score > 5) {
             if (itemRand < 0.1) type = 'thunder_v';
             else if (itemRand < 0.2) type = 'thunder_h';
             else if (itemRand < 0.3) type = 'split';
             else if (itemRand < (score <= 100 ? 0.70 : 0.60)) type = 'coin';
          }
          
          if (type === 'add_ball') {
              if (addBallCount >= 1) {
                  type = 'coin';
              } else {
                  addBallCount++;
              }
          }
          
          items.push({ id: Math.random().toString(36).substring(7), col: c, row, type, collected: false, triggered: false });
        }
      }
      return { blocks, items };
    };

    let state = {
      status: 'START_SCREEN',
      previousStatus: null,
      bossWarningTimer: 0,
      bossWarningText: '',
      abilities: {},
      pendingAbilities: [],
      totalCoins: parseInt(storage.getItem('dinoTotalCoins')) || 0,
      baseDamage: parseInt(storage.getItem('dinoBaseDamage')) || 1,
      explosionLevel: parseInt(storage.getItem('explosionLevel')) || 0,
      penetrationLevel: parseInt(storage.getItem('penetrationLevel')) || 0,
      mainBallsLevel: parseInt(storage.getItem('dinoMainBallsLevel')) || 1,
      particles: [],
      warpBlocks: [],
      effects: [],
      blocks: [],
      items: [],
      balls: [],
      score: 0,
      ballsTotal: 5,
      addedBallsNextTurn: 0,
      startX: LOGICAL_WIDTH / 2,
      firstReturnX: null,
      targetPoint: null,
      shootTimer: 0,
      ballsLaunched: 0,
      blocksCountAtStart: 0,
      warpCounter: 0,
      warpTimer: 0,
      turnTimer: 0,
      speedMult: 1.0,
      username: storage.getItem('dinoUsername') || 'Player',
      lastPlayTimestamp: null,
      bossDefeatedThisTurn: false,
      defeatedBossWas100: false
    };

    let leaderboard = JSON.parse(storage.getItem('dinoLeaderboard'));
    if (!leaderboard) {
        leaderboard = [];
        storage.setItem('dinoLeaderboard', JSON.stringify(leaderboard));
    }
    
    // Clean up any old dummy data if it exists from previous versions
    leaderboard = leaderboard.filter(entry => entry.timestamp);
    storage.setItem('dinoLeaderboard', JSON.stringify(leaderboard));

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreText = document.getElementById('scoreText');
    const highScoreText = document.getElementById('highScoreText');
    const topCoinText = document.getElementById('topCoinText');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const retryButton = document.getElementById('retryButton');
    const overlayTitle = document.getElementById('overlayTitle');
    const menuBtn = document.getElementById('menuBtn');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const resumeBtn = document.getElementById('resumeBtn');
    const quitBtn = document.getElementById('quitBtn');

    const usernameInput = document.getElementById('usernameInput');
    usernameInput.value = state.username;
    usernameInput.addEventListener('input', (e) => {
        state.username = e.target.value || 'Player';
        storage.setItem('dinoUsername', state.username);
    });

    const rankingOverlay = document.getElementById('rankingOverlay');
    const rankingList = document.getElementById('rankingList');
    const rankingBtn = document.getElementById('rankingBtn');
    const closeRankingBtn = document.getElementById('closeRankingBtn');

    rankingBtn.addEventListener('click', () => {
        rankingList.innerHTML = '';
        if (leaderboard.length === 0) {
            rankingList.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 2rem;">No players yet.<br>Be the first!</div>';
        }
        
        leaderboard.forEach((entry, index) => {
            const item = document.createElement('div');
            const isMe = entry.timestamp && entry.timestamp === state.lastPlayTimestamp;
            item.style.display = 'flex';
            item.style.justifyContent = 'space-between';
            item.style.padding = '0.8rem 1rem';
            item.style.borderRadius = '8px';
            item.style.background = isMe ? 'rgba(250, 204, 21, 0.2)' : 'rgba(255, 255, 255, 0.05)';
            item.style.border = isMe ? '1px solid #facc15' : 'none';
            item.style.boxShadow = isMe ? '0 0 10px rgba(250, 204, 21, 0.5)' : 'none';
            
            let rankColor = '#94a3b8';
            if (index === 0) rankColor = '#facc15'; 
            else if (index === 1) rankColor = '#e2e8f0'; 
            else if (index === 2) rankColor = '#b45309'; 
            
            item.innerHTML = `
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="color: ${rankColor}; font-weight: 900; font-size: 1.2rem; width: 30px;">#${index + 1}</span>
                    <span style="color: #fff; font-weight: 700; font-size: 1.1rem;">${entry.name}</span>
                </div>
                <span style="color: #38bdf8; font-weight: 900; font-size: 1.2rem;">Lv.${entry.score}</span>
            `;
            rankingList.appendChild(item);
        });
        
        gameOverOverlay.classList.remove('active');
        pauseOverlay.classList.remove('active');
        rankingOverlay.classList.add('active');
    });

    closeRankingBtn.addEventListener('click', () => {
        rankingOverlay.classList.remove('active');
        updateUI(); 
    });

    menuBtn.addEventListener('click', () => {
      if (state.status !== 'START_SCREEN' && state.status !== 'GAME_OVER' && state.status !== 'PAUSED') {
        state.previousStatus = state.status;
        state.status = 'PAUSED';
        updateUI();
      }
    });

    resumeBtn.addEventListener('click', () => {
      if (state.status === 'PAUSED') {
        state.status = state.previousStatus;
        updateUI();
      }
    });

    quitBtn.addEventListener('click', () => {
      state.status = 'START_SCREEN';
      updateUI();
    });

    const updateShopUI = () => {
        const costBase = 50 + (state.baseDamage - 1) * 30;
        const costExpl = 100 + (state.explosionLevel) * 50;
        const costPen = 300;
        const costMainBalls = 200;
        
        document.getElementById('shopCoins').innerText = state.totalCoins || 0;
        
        document.getElementById('shopBaseDamage').innerText = state.baseDamage >= 10 ? 'MAX' : state.baseDamage;
        if (state.baseDamage >= 10) {
            document.getElementById('upgradeBtn').innerText = 'MAX LEVEL';
            document.getElementById('upgradeBtn').style.opacity = '0.5';
        } else {
            document.getElementById('upgradeBtn').innerHTML = `UPGRADE (<span id="upgradeCost">${costBase}</span>)`;
            document.getElementById('upgradeBtn').style.opacity = state.totalCoins >= costBase ? '1' : '0.5';
        }
        
        document.getElementById('shopExplosion').innerText = state.explosionLevel >= 10 ? 'MAX' : state.explosionLevel;
        if (state.explosionLevel >= 10) {
            document.getElementById('upgradeExplosionBtn').innerText = 'MAX LEVEL';
            document.getElementById('upgradeExplosionBtn').style.opacity = '0.5';
        } else {
            document.getElementById('upgradeExplosionBtn').innerHTML = `UPGRADE (<span id="costExplosion">${costExpl}</span>)`;
            document.getElementById('upgradeExplosionBtn').style.opacity = state.totalCoins >= costExpl ? '1' : '0.5';
        }
        
        document.getElementById('shopPenetration').innerText = state.penetrationLevel >= 1 ? 'MAX' : state.penetrationLevel;
        if (state.penetrationLevel >= 1) {
            document.getElementById('upgradePenetrationBtn').innerText = 'MAX LEVEL';
            document.getElementById('upgradePenetrationBtn').style.opacity = '0.5';
        } else {
            document.getElementById('upgradePenetrationBtn').innerHTML = `UPGRADE (<span id="costPenetration">${costPen}</span>)`;
            document.getElementById('upgradePenetrationBtn').style.opacity = state.totalCoins >= costPen ? '1' : '0.5';

            document.getElementById('upgradeMainBallsBtn').innerHTML = `UPGRADE (<span id="costMainBalls">${costMainBalls}</span>)`;

        }

    const openShopBtn = document.getElementById('openShopBtn');
    const closeShopBtn = document.getElementById('closeShopBtn');
    const upgradeBtn = document.getElementById('upgradeBtn');
    const upgradeExplosionBtn = document.getElementById('upgradeExplosionBtn');
    const upgradePenetrationBtn = document.getElementById('upgradePenetrationBtn');
    const upgradeMainBallsBtn = document.getElementById('upgradeMainBallsBtn');
    const shopOverlay = document.getElementById('shopOverlay');

    openShopBtn.addEventListener('click', () => {
        state.status = 'SHOP';
        updateShopUI();
        updateUI();
    });

    closeShopBtn.addEventListener('click', () => {
        state.status = 'PAUSED';
        updateUI();
    });

    upgradeBtn.addEventListener('click', () => {
        const cost = 50 + (state.baseDamage - 1) * 30;
        if (state.totalCoins >= cost && state.baseDamage < 10) {
            state.totalCoins -= cost;
            state.baseDamage++;
            storage.setItem('dinoTotalCoins', state.totalCoins.toString());
            storage.setItem('dinoBaseDamage', state.baseDamage.toString());
            updateShopUI();
            topCoinText.innerText = state.totalCoins;
        }
    });
    
    upgradeExplosionBtn.addEventListener('click', () => {
        const cost = 100 + (state.explosionLevel) * 50;
        if (state.totalCoins >= cost && state.explosionLevel < 10) {
            state.totalCoins -= cost;
            state.explosionLevel++;
            storage.setItem('dinoTotalCoins', state.totalCoins.toString());
            storage.setItem('explosionLevel', state.explosionLevel.toString());
            updateShopUI();
            topCoinText.innerText = state.totalCoins;
        }
    });

    upgradePenetrationBtn.addEventListener('click', () => {
        const cost = 300;
        if (state.totalCoins >= cost && state.penetrationLevel < 1) {
            state.totalCoins -= cost;
            state.penetrationLevel++;
            storage.setItem('dinoTotalCoins', state.totalCoins.toString());
            storage.setItem('penetrationLevel', state.penetrationLevel.toString());
            updateShopUI();
            topCoinText.innerText = state.totalCoins;
        }
    });
    
    upgradeMainBallsBtn.addEventListener('click', () => {
        const cost = 200;
        if (state.totalCoins >= cost && state.mainBallsLevel < 5) {
            state.totalCoins -= cost;
            state.mainBallsLevel++;
            storage.setItem('dinoTotalCoins', state.totalCoins.toString());
            storage.setItem('dinoMainBallsLevel', state.mainBallsLevel.toString());
            updateShopUI();
            topCoinText.innerText = state.totalCoins;
        }
    });

    const updateUI = () => {
      scoreText.innerText = state.score;
      highScoreText.innerText = highScore;
      topCoinText.innerText = state.totalCoins || 0;
      if (state.status === 'GAME_OVER' || state.status === 'START_SCREEN') {
        overlayTitle.innerText = state.status === 'GAME_OVER' ? 'GAME OVER' : 'DINO BALLZ';
        if (state.status === 'START_SCREEN') {
          let hasSave = false;
          try {
              const rawSave = storage.getItem('dinoSaveState');
              if (rawSave && rawSave !== 'null' && rawSave !== 'undefined') {
                  const parsed = JSON.parse(rawSave);
                  if (parsed && typeof parsed === 'object') {
                      hasSave = true;
                  }
              }
          } catch(e) {
              console.error("Corrupted save detected on UI update", e);
              storage.removeItem('dinoSaveState');
          }
          
          if (hasSave) {
              document.getElementById('continueBtn').style.display = 'block';
              document.getElementById('retryButton').innerText = 'NEW GAME';
          } else {
              document.getElementById('continueBtn').style.display = 'none';
              document.getElementById('retryButton').innerText = 'START';
          }
        }
        gameOverOverlay.classList.add('active');
        pauseOverlay.classList.remove('active');
        rankingOverlay.classList.remove('active');
        shopOverlay.classList.remove('active');
      } else if (state.status === 'PAUSED') {
        gameOverOverlay.classList.remove('active');
        pauseOverlay.classList.add('active');
        rankingOverlay.classList.remove('active');
        shopOverlay.classList.remove('active');
      } else if (state.status === 'SHOP') {
        gameOverOverlay.classList.remove('active');
        pauseOverlay.classList.remove('active');
        rankingOverlay.classList.remove('active');
        shopOverlay.classList.add('active');
      } else {
        gameOverOverlay.classList.remove('active');
        pauseOverlay.classList.remove('active');
        rankingOverlay.classList.remove('active');
        shopOverlay.classList.remove('active');
      }
    };

    const setTargetPoint = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = LOGICAL_WIDTH / rect.width;
      const scaleY = LOGICAL_HEIGHT / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    };

    const shoot = () => {
      if (state.status !== 'AIMING' || !state.targetPoint) return;
      
      const aim = getClampedAimDir(state.startX, state.targetPoint.x, state.targetPoint.y);
      if (Math.hypot(aim.dx, aim.dy) < 10) return;

      const vx = aim.dirX * BALL_SPEED;
      const vy = aim.dirY * BALL_SPEED;

      state.balls = Array.from({ length: state.ballsTotal }).map((_, idx) => ({
        x: state.startX,
        y: FLOOR_Y - BALL_RADIUS,
        vx,
        vy,
        active: false,
        launched: false,
        isLeader: idx < (state.mainBallsLevel || 1),
        bounceCount: 0,
        history: [], 
        hitCount: 0
      }));

      state.status = 'SHOOTING';
      state.shootTimer = 0;
      state.ballsLaunched = 0;
      state.firstReturnX = null;
      state.targetPoint = null;
      state.blocksCountAtStart = state.blocks.length;
      state.turnTimer = 0;
      state.speedMult = 1.0 + 0.15 * (state.abilities.speedStar || 0);
      state.bossDefeatedThisTurn = false;
      state.defeatedBossWas100 = false;
    };

    const ABILITY_POOL = [
        { id: 'childBallPower', name: 'Child Power', desc: '子ボールのダメージ+1', color: '#60a5fa' },
        { id: 'criticalHit', name: 'Critical Hit', desc: '5%の確率でダメージ2倍', color: '#f87171' },
        { id: 'speedStar', name: 'Speed Star', desc: 'ボール速度+15%', color: '#facc15' },
        { id: 'explosionExpand', name: 'Explosion Expand', desc: '爆発範囲+1マス', color: '#fb923c' },
        { id: 'goldRush', name: 'Gold Rush', desc: '獲得コイン量x1.5', color: '#fcd34d' },
        { id: 'bounceMage', name: 'Bounce Mage', desc: '壁反射でダメージ+2', color: '#c084fc' },
        { id: 'insurance', name: 'Insurance', desc: '親玉の下部バウンド+1回', color: '#34d399' },
        { id: 'lastSpurt', name: 'Last Spurt', desc: 'ピンチ時に全ダメージ2倍', color: '#ef4444' }
    ];

    const generateAbilities = () => {
        // Pick 3 random distinct abilities
        const shuffled = [...ABILITY_POOL].sort(() => 0.5 - Math.random());
        state.pendingAbilities = shuffled.slice(0, 3);
        
        const container = document.getElementById('abilityChoices');
        container.innerHTML = '';
        
        state.pendingAbilities.forEach(ability => {
            const btn = document.createElement('button');
            btn.className = 'retry-button';
            btn.style.background = `linear-gradient(135deg, ${ability.color}, #00000088)`;
            btn.style.boxShadow = `0 4px 6px ${ability.color}66`;
            btn.style.marginBottom = '0.5rem';
            btn.style.padding = '1rem';
            btn.style.display = 'flex';
            btn.style.flexDirection = 'column';
            btn.style.alignItems = 'center';
            btn.style.gap = '0.5rem';
            
            btn.innerHTML = `
                <div style="font-size: 1.5rem; font-weight: 900; color: #fff;">${ability.name}</div>
                <div style="font-size: 1rem; color: #f1f5f9;">${ability.desc}</div>
                <div style="font-size: 0.9rem; color: #cbd5e1;">(現在: Lv.${state.abilities[ability.id] || 0})</div>
            `;
            
            btn.addEventListener('click', () => {
                state.abilities[ability.id] = (state.abilities[ability.id] || 0) + 1;
                document.getElementById('abilityOverlay').classList.remove('active');
                
                // Proceed to warping
                state.status = 'WARPING';
                state.warpCounter = 0;
                state.warpTimer = 0;
                state.warpBlocks = [];
                state.blocks = [];
                state.items = [];
                state.effects.push({ type: 'warp_lightning', isBoss: true, timer: 1.5, y: LOGICAL_HEIGHT / 2 });
                state.effects.push({ type: 'eval_text_warp', text: 'BOSS DEFEATED!', color: '#f43f5e', timer: 1.5, y: LOGICAL_HEIGHT / 2 });
                
                storage.setItem('dinoSaveState', JSON.stringify({
                    score: state.score,
                    ballsTotal: state.ballsTotal,
                    blocks: state.blocks,
                    items: state.items,
                    abilities: state.abilities,
                    startX: state.startX
                }));
            });
            container.appendChild(btn);
        });
        
        document.getElementById('abilityOverlay').classList.add('active');
    };

    let isDragging = false; 

    const handleInputDown = (pt) => {
      if ((state.status === 'SHOOTING' || state.status === 'RESOLVING') && pt.y > LOGICAL_HEIGHT - 90 && pt.x > LOGICAL_WIDTH - 90) {
          state.balls.forEach(b => {
             if(b.active || !b.launched) {
                b.active = false;
                b.history = [];
                b.y = FLOOR_Y - BALL_RADIUS;
                if (state.firstReturnX === null) {
                    state.firstReturnX = b.x;
                }
             }
          });
          state.ballsLaunched = state.ballsTotal;
          state.status = 'RESOLVING';
          return;
      }

      if (state.status === 'AIMING') {
        isDragging = true;
        state.targetPoint = pt;
      }
    };

    const handleInputMove = (pt) => {
      if (state.status !== 'AIMING' || !isDragging) return;
      state.targetPoint = pt;
    };

    const handleInputUp = () => {
      if (state.status === 'AIMING' && isDragging) {
        shoot();
      }
      isDragging = false;
    };

    // Mouse Events
    canvas.addEventListener('mousedown', (e) => {
       handleInputDown(setTargetPoint(e));
    });
    canvas.addEventListener('mousemove', (e) => {
       if (e.buttons !== 1) return;
       handleInputMove(setTargetPoint(e));
    });
    window.addEventListener('mouseup', () => {
       handleInputUp();
    });

    // Touch Events
    canvas.addEventListener('touchstart', (e) => {
       if (e.cancelable) e.preventDefault();
       handleInputDown(setTargetPoint(e.touches[0]));
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
       if (e.cancelable) e.preventDefault();
       handleInputMove(setTargetPoint(e.touches[0]));
    }, { passive: false });
    window.addEventListener('touchend', (e) => {
       handleInputUp();
    });

    retryButton.addEventListener('click', () => {
        if (state.status === 'START_SCREEN' || state.status === 'GAME_OVER') {
            storage.removeItem('dinoSaveState');
            const username = usernameInput.value.trim() || "Player";
            storage.setItem('dinoUsername', username);
            const initRow = generateRow(1, 1);
            let startingBalls = 5;
            
            state = {
                status: 'AIMING',
                abilities: {},
                pendingAbilities: [],
                totalCoins: state.totalCoins || 0,
                baseDamage: state.baseDamage || 1,
                explosionLevel: state.explosionLevel || 0,
                penetrationLevel: state.penetrationLevel || 0,
                mainBallsLevel: state.mainBallsLevel || 1,
                particles: [],
                warpBlocks: [],
                balls: [],
                blocks: initRow.blocks,
                items: initRow.items,
                effects: [],
                score: 1,
                bossWarningTimer: 0,
                bossWarningText: '',
                ballsTotal: startingBalls,
                addedBallsNextTurn: 0,
                startX: LOGICAL_WIDTH / 2,
                firstReturnX: null,
                targetPoint: null,
                shootTimer: 0,
                ballsLaunched: 0,
                blocksCountAtStart: 0,
                warpCounter: 0,
                warpTimer: 0,
                turnTimer: 0,
                speedMult: 1.0,
                bossDefeatedThisTurn: false,
                defeatedBossWas100: false,
                username: username,
                lastPlayTimestamp: state.lastPlayTimestamp
            };
            updateUI();
        }
    });

    const continueBtn = document.getElementById('continueBtn');
    continueBtn.addEventListener('click', () => {
        let saved = null;
        try {
            const saveStateStr = storage.getItem('dinoSaveState');
            if (!saveStateStr || saveStateStr === 'null' || saveStateStr === 'undefined') {
                return;
            }
            saved = JSON.parse(saveStateStr);
        } catch(e) {
            console.error("Save load error", e);
            storage.removeItem('dinoSaveState');
            return;
        }
        
        if (saved && state.status === 'START_SCREEN') {
            const username = usernameInput.value.trim() || "Player";
            storage.setItem('dinoUsername', username);
            
            state.username = username;
            state.status = 'AIMING';
            state.score = saved.score || 1;
            state.ballsTotal = saved.ballsTotal || 1;
            state.blocks = saved.blocks || [];
            state.items = saved.items || [];
            state.abilities = saved.abilities || {};
            state.pendingAbilities = [];
            state.startX = saved.startX || LOGICAL_WIDTH / 2;
            state.addedBallsNextTurn = 0;
            state.ballsLaunched = 0;
            state.balls = [];
            state.particles = [];
            state.warpBlocks = [];
            state.effects = [];
            state.bossDefeatedThisTurn = false;
            state.defeatedBossWas100 = false;
            updateUI();
        }
    });

    const triggerThunder = (item) => {
        let existingFlash = state.effects.find(e => e.type === 'thunder_flash');
        if (existingFlash) {
            existingFlash.timer = 0.3;
        } else {
            state.effects.push({ type: 'thunder_flash', timer: 0.3 });
        }
        
        const thunderDamage = state.baseDamage;
        const isVertical = item.type === 'thunder_v';
        const effectType = item.type;
        const ex = item.col * BLOCK_SIZE + BLOCK_SIZE / 2;
        const ey = item.row * BLOCK_SIZE + BLOCK_SIZE / 2;
        
        let existingStrike = state.effects.find(e => e.type === effectType && e.x === ex && e.y === ey);
        if (existingStrike) {
            existingStrike.timer = 0.8;
        } else {
            state.effects.push({
                type: effectType,
                x: ex,
                y: ey,
                timer: 0.8
            });
        }

        if (item.type === 'thunder_v') {
            state.blocks.forEach(b => {
                if (b.type === 'ghost' && b.isTransparent) return;
                if (Math.abs(b.col - item.col) < 0.5) {
                    b.hp -= thunderDamage;
                    b.hitTimer = 0.15;
                }
            });
        } else {
            state.blocks.forEach(b => {
                if (b.type === 'ghost' && b.isTransparent) return;
                if (Math.abs(b.row - item.row) < 0.5) {
                    b.hp -= thunderDamage;
                    b.hitTimer = 0.15;
                }
            });
        }
    };

    const spawnParticles = (x, y, color, count = 15) => {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 400 + 100;
            state.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 200,
                life: Math.random() * 0.4 + 0.2,
                maxLife: 0.6,
                color,
                size: Math.random() * 6 + 3
            });
        }
    };

    const tick = (dt, time = 0) => {
      if (state.bossWarningTimer > 0) state.bossWarningTimer -= dt;
      if (state.status === 'GAME_OVER' || state.status === 'START_SCREEN' || state.status === 'PAUSED') return;

      if (state.status === 'AIMING') {
          state.blocks.forEach(b => {
              const blockCenterX = b.col * BLOCK_SIZE + BLOCK_SIZE / 2;
              if (Math.abs(blockCenterX - state.startX) < BLOCK_SIZE * 0.8) {
                  if (b.shape === 'triangle_tl') b.shape = 'triangle_bl';
                  else if (b.shape === 'triangle_tr') b.shape = 'triangle_br';
              }
          });
      }

      if (state.status === 'WARPING') {
          state.warpBlocks.forEach(b => {
              b.y += 1500 * dt;
          });
          
          state.warpBlocks = state.warpBlocks.filter(b => {
              if (b.y >= LOGICAL_HEIGHT / 2) {
                  spawnParticles(b.x, LOGICAL_HEIGHT / 2, b.color, b.isItem ? 6 : 12);
                  if (b.isItem && b.type === 'add_ball') {
                      state.addedBallsNextTurn++;
                  }
                  return false; 
              }
              return true;
          });

          state.warpTimer += dt;
          while (state.warpTimer >= 0.1 && state.warpCounter < 10) {
              state.warpTimer -= 0.1;
              state.score++;
              
              if (state.score > 0 && state.score % 50 === 0) {
                  // Reached a boss level. Stop warping exactly at 49.
                  state.score--;
                  state.warpCounter = 10; // End loop early
              } else {
                  state.warpCounter++;
              }
              if (state.score > highScore) {
                 highScore = state.score;
                 storage.setItem('dinoHighScore', highScore);
              }
              
              const newRow = generateRow(0, state.score);
              newRow.blocks.forEach(b => {
                  let mainColor = '#38bdf8';
                  if (b.type === 'iron') mainColor = '#94a3b8';
                  else if (b.type === 'muddy' || b.type === 'slime') mainColor = '#4ade80';
                  else if (b.type === 'ghost') mainColor = '#c084fc';
                  else mainColor = `hsl(${Math.max(0, 200 - b.hp * 2)}, 80%, 60%)`;
                  
                  state.warpBlocks.push({
                      x: b.col * BLOCK_SIZE + BLOCK_SIZE / 2,
                      y: -BLOCK_SIZE,
                      hp: b.hp,
                      color: mainColor,
                      type: b.type,
                      isItem: false
                  });
              });

              newRow.items.forEach(i => {
                  state.warpBlocks.push({
                      x: i.col * BLOCK_SIZE + BLOCK_SIZE / 2,
                      y: -BLOCK_SIZE,
                      hp: '',
                      color: '#facc15',
                      type: i.type,
                      isItem: true
                  });
              });

              updateUI();
          }
          
          if (state.warpCounter >= 10 && state.warpBlocks.length === 0) {
              state.startX = state.firstReturnX !== null ? state.firstReturnX : state.startX;
              state.ballsTotal += state.addedBallsNextTurn;
              state.addedBallsNextTurn = 0;
              
              const bonusCoins = Math.floor(15 * Math.pow(1.5, state.abilities.goldRush || 0));
              state.totalCoins = (state.totalCoins || 0) + bonusCoins;
              storage.setItem('dinoTotalCoins', state.totalCoins.toString());
              
              state.effects.push({ type: 'eval_text_warp', text: `+${bonusCoins} COINS!`, color: '#fbbf24', timer: 1.5, y: LOGICAL_HEIGHT / 2 - 80 });
              
              const newRow = generateRow(0, state.score);
              state.blocks.push(...newRow.blocks);
              state.items.push(...newRow.items);
              state.status = 'AIMING';
              
              if (state.score > 0 && state.score % 50 === 49) {
                  state.bossWarningTimer = 2.0;
                  state.bossWarningText = 'BOSS INCOMING';
              } else if (state.score > 0 && state.score % 50 === 0) {
                  state.bossWarningTimer = 2.0;
                  state.bossWarningText = 'BOSS APPEARED!';
              }
              state.balls = [];
              state.firstReturnX = null;
              updateUI();
          }
          return; 
      }

      if (state.status === 'SHOOTING') {
        state.shootTimer += dt * state.speedMult;
        while (state.shootTimer > SHOOT_DELAY && state.ballsLaunched < state.ballsTotal) {
          state.balls[state.ballsLaunched].active = true;
          state.balls[state.ballsLaunched].launched = true;
          state.ballsLaunched++;
          state.shootTimer -= SHOOT_DELAY;
        }
        if (state.ballsLaunched === state.ballsTotal) {
          state.status = 'RESOLVING';
        }
      }

      if (state.status === 'SHOOTING' || state.status === 'RESOLVING') {
         state.turnTimer += dt;
         if (state.speedMult < 2.5) {
            state.speedMult = Math.min(2.5, state.speedMult + dt * 0.3);
         }
      }

      state.particles.forEach(p => {
          p.x += p.vx * dt * state.speedMult;
          p.y += p.vy * dt * state.speedMult;
          p.vy += 1500 * dt * state.speedMult;
          p.life -= dt * state.speedMult;
      });
      state.particles = state.particles.filter(p => p.life > 0);

      for (let i = 0; i < state.blocks.length; i++) {
          if (state.blocks[i].hitTimer > 0) state.blocks[i].hitTimer -= dt;
      }

      if (state.status === 'SHOOTING' || state.status === 'RESOLVING') {
        let activeCount = 0;

        for (let i = 0; i < state.balls.length; i++) {
          const b = state.balls[i];
          if (!b.active) continue;

          activeCount++;
          
          b.history.push({x: b.x, y: b.y});
          if (b.history.length > 5) b.history.shift();

        let subSteps = Math.ceil(2 * state.speedMult); 
        let subDt = (dt * state.speedMult) / subSteps;
        
        let bounceCountThisFrame = 0;
        subStepLoop:
        for (let s = 0; s < subSteps; s++) {
           if (!b.active) break;
           b.x += b.vx * subDt;
           b.y += b.vy * subDt;

             let wallBounced = false;
             let isCollidingWithAnyBlock = false;
             if (b.x - BALL_RADIUS < 0) { b.x = BALL_RADIUS; b.vx *= -1; b.hitCount++; wallBounced = true; }
             if (b.x + BALL_RADIUS > LOGICAL_WIDTH) { b.x = LOGICAL_WIDTH - BALL_RADIUS; b.vx *= -1; b.hitCount++; wallBounced = true; }
             if (b.y - BALL_RADIUS < 0) { b.y = BALL_RADIUS; b.vy *= -1; b.hitCount++; wallBounced = true; }

             if (wallBounced) {
                 if (state.abilities.bounceMage) {
                     b.bounceBonusDamage = (b.bounceBonusDamage || 0) + (2 * state.abilities.bounceMage);
                 }
                 bounceCountThisFrame++;
                 if (bounceCountThisFrame >= 5) {
                     b.x += (Math.random() - 0.5) * 1.0;
                     b.y += (Math.random() - 0.5) * 1.0;
                     break subStepLoop;
                 }
             }

             if (b.vy > 0 && b.y + BALL_RADIUS > DOTTED_LINE_Y) {
               let shouldBounce = false;
               if (b.isLeader && b.bounceCount < 1 + (state.abilities.insurance || 0)) {
                   shouldBounce = true;
                   b.bounceCount++;
               }

               if (shouldBounce) {
                   b.y = DOTTED_LINE_Y - BALL_RADIUS;
                   b.vy *= -1;
               } else {
                   b.active = false;
                   b.history = []; // Clear trail
                   if (b.isLeader) {
                       b.y = FLOOR_Y - BALL_RADIUS;
                       if (state.firstReturnX === null) {
                         state.firstReturnX = b.x;
                       }
                   } else {
                       b.destroyed = true;
                   }
                   break;
               }
             }
             
             // Safety fallback
             if (b.vy > 0 && b.y + BALL_RADIUS > FLOOR_Y) {
                 b.active = false;
                 b.history = [];
                 if (b.isLeader) {
                     b.y = FLOOR_Y - BALL_RADIUS;
                     if (state.firstReturnX === null) {
                       state.firstReturnX = b.x;
                     }
                 } else {
                     b.destroyed = true;
                 }
                 break;
             }

             // Item Collision
             if (!b.lastItems) b.lastItems = new Set();
             let currentItems = new Set();

             for (let j = 0; j < state.items.length; j++) {
                const item = state.items[j];
                if (item.collected) continue; 
                
                const floatOffset = Math.sin(time / 200) * 5;
                const ix = item.col * BLOCK_SIZE + BLOCK_SIZE / 2;
                const iy = item.row * BLOCK_SIZE + BLOCK_SIZE / 2 + floatOffset;
                const itemRadius = 15;
                const distSq = (b.x - ix) ** 2 + (b.y - iy) ** 2;
                
                if (distSq < (BALL_RADIUS + itemRadius) ** 2) {
                    currentItems.add(item.id);
                    if (b.lastItems.has(item.id)) continue; // Already processed this intersection

                    if (item.type === 'split') {
                        item.triggered = true; // Flags for removal at turn end
                        
                        if (!b.isSplitClone && state.balls.length < 3000) {
                            const angle = Math.atan2(b.vy, b.vx);
                            const speed = BALL_SPEED;
                            const jitter1 = (Math.PI / 6) + Math.random() * (Math.PI / 6);
                            const jitter2 = (Math.PI / 6) + Math.random() * (Math.PI / 6);
                            let angle1 = angle + jitter1;
                            let angle2 = angle - jitter2;
                            
                            if (Math.abs(Math.sin(angle1)) < 0.05) angle1 += 0.1;
                            if (Math.abs(Math.sin(angle2)) < 0.05) angle2 -= 0.1;
                            
                            const newLastItems = new Set([item.id]);
                            state.balls.push({
                                x: b.x, y: b.y,
                                vx: Math.cos(angle1) * speed,
                                vy: Math.sin(angle1) * speed,
                                active: true, launched: true, history: [],
                                isLeader: false,
                                lastItems: newLastItems,
                                isSplitClone: true
                            });
                            
                            state.balls.push({
                                x: b.x, y: b.y,
                                vx: Math.cos(angle2) * speed,
                                vy: Math.sin(angle2) * speed,
                                active: true, launched: true, history: [],
                                isLeader: false,
                                lastItems: newLastItems,
                                isSplitClone: true
                            });
                        }
                    } else if (item.type === 'thunder_v' || item.type === 'thunder_h') {
                        item.triggered = true; // Flags for removal at turn end
                        triggerThunder(item);
                    } else if (item.type === 'add_ball') {
                        item.collected = true; // Consumed instantly
                        state.addedBallsNextTurn++;
                    } else if (item.type === 'coin') {
                        item.collected = true;
                        state.totalCoins += Math.floor(1 * Math.pow(1.5, state.abilities.goldRush || 0));
                        storage.setItem('dinoTotalCoins', state.totalCoins.toString());
                        // Particle effect
                        for(let k=0; k<8; k++){
                            const a = Math.random() * Math.PI * 2;
                            const s = Math.random() * 3 + 1;
                            state.particles.push({
                                x: item.col * BLOCK_SIZE + BLOCK_SIZE / 2,
                                y: item.row * BLOCK_SIZE + BLOCK_SIZE / 2,
                                vx: Math.cos(a) * s,
                                vy: Math.sin(a) * s,
                                life: 1.0, maxLife: 1.0, color: '#facc15'
                            });
                        }
                    }
                }
             }
             b.lastItems = currentItems;

             // Block Collision
             for (let j = 0; j < state.blocks.length; j++) {
               const block = state.blocks[j];
               if (block.hp <= 0 || block.isTransparent) continue;

               const blockLeft = block.col * BLOCK_SIZE;
               const blockRight = blockLeft + BLOCK_SIZE * (block.width || 1);
               const blockTop = block.row * BLOCK_SIZE;
               const blockBottom = blockTop + BLOCK_SIZE;

               if (b.x + BALL_RADIUS < blockLeft || b.x - BALL_RADIUS > blockRight ||
                   b.y + BALL_RADIUS < blockTop || b.y - BALL_RADIUS > blockBottom) {
                   continue;
               }

               let hitHypotenuse = false;
               let isColliding = false;

               if (block.shape && block.shape !== 'square') {
                   const rx = b.x - blockLeft;
                   const ry = b.y - blockTop;
                   const w = BLOCK_SIZE;
                   const rDiag = BALL_RADIUS * 1.4142; 

                   if (block.shape === 'triangle_tl') {
                       if (rx + ry > w && rx + ry - w < rDiag) {
                           hitHypotenuse = true; isColliding = true;
                           const distOut = rDiag - (rx + ry - w);
                           b.x += distOut / 2; b.y += distOut / 2;
                       } else if (rx + ry <= w) isColliding = true;
                   } else if (block.shape === 'triangle_tr') {
                       if (ry > rx && ry - rx < rDiag) {
                           hitHypotenuse = true; isColliding = true;
                           const distOut = rDiag - (ry - rx);
                           b.x -= distOut / 2; b.y += distOut / 2;
                       } else if (ry <= rx) isColliding = true;
                   } else if (block.shape === 'triangle_bl') {
                       if (rx > ry && rx - ry < rDiag) {
                           hitHypotenuse = true; isColliding = true;
                           const distOut = rDiag - (rx - ry);
                           b.x += distOut / 2; b.y -= distOut / 2;
                       } else if (rx <= ry) isColliding = true;
                   } else if (block.shape === 'triangle_br') {
                       if (rx + ry < w && w - (rx + ry) < rDiag) {
                           hitHypotenuse = true; isColliding = true;
                           const distOut = rDiag - (w - (rx + ry));
                           b.x -= distOut / 2; b.y -= distOut / 2;
                       } else if (rx + ry >= w) isColliding = true;
                   }
                   
                   if (!isColliding) continue;
               } else {
                   isColliding = true;
               }

               const closestX = Math.max(blockLeft, Math.min(b.x, blockRight));
               const closestY = Math.max(blockTop, Math.min(b.y, blockBottom));
               const distanceX = b.x - closestX;
               const distanceY = b.y - closestY;
               const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

               if (!hitHypotenuse && distanceSquared >= BALL_RADIUS * BALL_RADIUS) {
                   continue;
               }
                 
                isCollidingWithAnyBlock = true;
                let bounceDamage = b.bounceBonusDamage || 0;
                b.bounceBonusDamage = 0;
                 
                let isFirstHit = b.isLeader && !b.hasHitBlock;
                if (isFirstHit) {
                    b.hasHitBlock = true;
                    if (state.penetrationLevel > 0) {
                        b.penetrationMode = true;
                        b.penetratedBlocks = new Set();
                    }
                }
                
                let skipDamage = false;
                if (b.penetrationMode && b.penetratedBlocks && b.penetratedBlocks.has(block.id)) {
                    skipDamage = true;
                }
                  
                let damage = b.isLeader ? state.baseDamage : (1 + (state.abilities.childBallPower || 0));
                if (b.isLeader) {
                    damage += Math.max(1, state.baseDamage); 
                }
                
                damage += bounceDamage;

                if (state.abilities.criticalHit && Math.random() < 0.05 * state.abilities.criticalHit) {
                    damage *= 2;
                }

                let hasBlockNearBottom = state.blocks.some(bl => bl.hp > 0 && !bl.isTransparent && (bl.row * BLOCK_SIZE + BLOCK_SIZE) >= DOTTED_LINE_Y - BLOCK_SIZE);
                if (state.abilities.lastSpurt && hasBlockNearBottom) {
                    damage *= Math.pow(2, state.abilities.lastSpurt);
                }

                let applyExplosion = false;
                if (isFirstHit && state.explosionLevel > 0) {
                    applyExplosion = true;
                }

                let multiplier = 1;
               if (b.hitCount >= 200) multiplier = 5;
               else if (b.hitCount >= 100) multiplier = 2;
               
               damage *= multiplier;

               let instantKill = false;

               let hitEdge = null;
               if (!hitHypotenuse) {
                   if (Math.abs(distanceX) > Math.abs(distanceY)) {
                       hitEdge = distanceX > 0 ? 'right' : 'left';
                   } else {
                       hitEdge = distanceY > 0 ? 'bottom' : 'top';
                   }
               }

               if (block.shield && block.shield === hitEdge) {
                   damage = 0;
                   instantKill = false;
               }

               const prevHp = block.hp;
               if (!skipDamage) {
                   if (instantKill) {
                       block.hp = 0;
                   } else {
                       block.hp -= damage;
                   }
                   if (b.penetrationMode && b.penetratedBlocks) {
                       b.penetratedBlocks.add(block.id);
                   }
               }
               
               if (applyExplosion) {
                    const expDmg = state.explosionLevel * 10;
                    const targetCol = block.col;
                    const targetRow = block.row;
                    const expRadius = 1 + (state.abilities.explosionExpand || 0);
                    
                    state.blocks.forEach(nb => {
                        if (nb.hp > 0 && !nb.isTransparent && Math.abs(nb.col - targetCol) <= expRadius && Math.abs(nb.row - targetRow) <= expRadius) {
                            nb.hp -= expDmg;
                            nb.hitTimer = 0.1;
                           
                            state.effects.push({
                               type: 'damage_popup',
                               text: expDmg.toString(),
                               x: nb.col * BLOCK_SIZE + BLOCK_SIZE / 2,
                               y: nb.row * BLOCK_SIZE + BLOCK_SIZE / 2 - 10,
                               timer: 0.5,
                               scale: 1.2,
                               isBlue: false,
                               color: '#ef4444' // Red color for explosion
                           });
                       }
                   });
                   
                   for(let k=0; k<20; k++){
                       const a = Math.random() * Math.PI * 2;
                       const s = Math.random() * 6 + 2;
                       state.particles.push({
                           x: closestX,
                           y: closestY,
                           vx: Math.cos(a) * s,
                           vy: Math.sin(a) * s,
                           life: 1.5, maxLife: 1.5, color: '#f87171'
                       });
                   }
               }
               
               if (!skipDamage) {
                   b.hitCount++;
                   
                   if (multiplier > 1 && damage > 0 && block.hp < prevHp) {
                       state.effects.push({
                           type: 'damage_popup',
                           text: damage.toString(),
                           x: block.col * BLOCK_SIZE + BLOCK_SIZE / 2,
                           y: closestY - 20,
                           timer: 0.6,
                           scale: multiplier === 5 ? 1.5 : 1.2,
                           isBlue: multiplier === 5
                       });
                   }
                   
                   if (damage > 0 || instantKill || applyExplosion) {
                       block.hitTimer = 0.1; // Trigger flash only if damaged
                   }
               }
               
               if (block.type === 'muddy' || block.type === 'slime' || block.type === 'boss_muddy') {
                   b.active = false;
                   b.history = [];
                   if (b.isLeader) {
                       b.y = FLOOR_Y - BALL_RADIUS;
                       if (state.firstReturnX === null) state.firstReturnX = b.x;
                   } else {
                       b.destroyed = true;
                   }
                   break;
               }

               let penetrate = false;
               if (b.penetrationMode) {
                   penetrate = true;
               }

               if (!penetrate) {
                   bounceCountThisFrame++;
                   if (bounceCountThisFrame >= 5) {
                       b.x += (Math.random() - 0.5) * 1.0;
                       b.y += (Math.random() - 0.5) * 1.0;
                       break subStepLoop;
                   }
                   if (hitHypotenuse) {
                       const temp = b.vx;
                       if (block.shape === 'triangle_tl' || block.shape === 'triangle_br') {
                           b.vx = -b.vy;
                           b.vy = -temp;
                       } else {
                           b.vx = b.vy;
                           b.vy = temp;
                       }
                   } else {
                       if (Math.abs(distanceX) > Math.abs(distanceY)) {
                           if (distanceX > 0) {
                               b.vx = Math.abs(b.vx);
                               b.x = blockRight + BALL_RADIUS;
                           } else {
                               b.vx = -Math.abs(b.vx);
                               b.x = blockLeft - BALL_RADIUS;
                           }
                       } else {
                           if (distanceY > 0) {
                               b.vy = Math.abs(b.vy);
                               b.y = blockBottom + BALL_RADIUS;
                           } else {
                               b.vy = -Math.abs(b.vy);
                               b.y = blockTop - BALL_RADIUS;
                           }
                       }
                   }
               }
               break;
             }
             
             if (!isCollidingWithAnyBlock && b.penetrationMode) {
                 b.penetrationMode = false;
                 if (b.penetratedBlocks) b.penetratedBlocks.clear();
             }
        }
      }

        let bossDefeated = false;
        
        for (let i = state.blocks.length - 1; i >= 0; i--) {
            const b = state.blocks[i];
            if (b.hp <= 0) {
                 const bx = b.col * BLOCK_SIZE + BLOCK_SIZE / 2;
                 const by = b.row * BLOCK_SIZE + BLOCK_SIZE / 2;
                 
                 if (b.type === 'iron') {
                     // Armor broken, transform to normal block
                     b.hp = state.score + Math.floor(Math.random() * (state.score * 0.5));
                     b.type = 'normal';
                     spawnParticles(bx, by, '#94a3b8', 20); // Metal fragments
                 } else if (b.type === 'boss_iron') {
                      b.hp = state.score <= 100 ? 1000 + state.score * 20 : Math.floor(1000 + state.score * 20 + Math.pow((state.score - 100) / 50, 2.5) * 2000);
                      b.type = 'boss'; // becomes normal boss
                     spawnParticles(bx, by, '#94a3b8', 50); // Heavy metal fragments
                 } else if (b.type === 'boss' || b.type === 'boss_shield' || b.type === 'boss_muddy') {
                     bossDefeated = true;
                     if (b.is100Boss) state.defeatedBossWas100 = true;
                     spawnParticles(bx, by, '#f43f5e', 50);
                     state.blocks.splice(i, 1);
                 } else {
                     let mainColor = '#38bdf8';
                     if (b.type === 'muddy' || b.type === 'slime') mainColor = '#4ade80';
                     else if (b.type === 'ghost') mainColor = '#c084fc';
                     else mainColor = `hsl(${Math.max(0, 200 - b.hp * 2)}, 80%, 60%)`;
                     
                     spawnParticles(bx, by, mainColor, 15);
                     state.blocks.splice(i, 1);
                 }
            }
        }

        if (bossDefeated) state.bossDefeatedThisTurn = true;

        if ((state.status === 'SHOOTING' || state.status === 'RESOLVING') && (state.blocks.length === 0 || bossDefeated)) {
            state.status = 'RESOLVING';
            for (let i = 0; i < state.balls.length; i++) {
                const b = state.balls[i];
                if (b.active) {
                    b.active = false;
                    b.history = [];
                    b.y = FLOOR_Y - BALL_RADIUS;
                    if (state.firstReturnX === null) state.firstReturnX = b.x;
                }
            }
        }

        let isAnyBallActive = false;
        for (let i = 0; i < state.balls.length; i++) {
            if (state.balls[i].active) {
                isAnyBallActive = true;
                break;
            }
        }
        
        if (state.status === 'RESOLVING' && !isAnyBallActive) {
          const blocksRemaining = state.blocks.length;
          const blocksDestroyed = state.blocksCountAtStart - blocksRemaining;

          let evalText = '';
          let evalColor = '';

          if (state.bossDefeatedThisTurn) {
              if (state.defeatedBossWas100) {
                  state.status = 'ABILITY_SELECT';
                  generateAbilities();
              } else {
                  state.status = 'WARPING';
                  state.warpCounter = 0;
                  state.warpTimer = 0;
                  state.warpBlocks = [];
                  state.blocks = [];
                  state.items = [];
                  state.effects.push({ type: 'warp_lightning', isBoss: true, timer: 1.5, y: LOGICAL_HEIGHT / 2 });
                  state.effects.push({ type: 'eval_text_warp', text: 'BOSS DEFEATED!', color: '#f43f5e', timer: 1.5, y: LOGICAL_HEIGHT / 2 });
              }
          } else if (blocksRemaining === 0 && state.blocksCountAtStart > 0) {
              if (state.score % 50 === 49) {
                  // ボス直前（49, 99...）で全消しした場合、ワープしてしまうと49ループに陥りボスが出ないためワープをキャンセル
                  evalText = 'FANTASTIC';
                  evalColor = '#facc15';
              } else {
                  state.status = 'WARPING';
                  state.warpCounter = 0;
                  state.warpTimer = 0;
                  state.effects.push({ type: 'warp_lightning', isBoss: false, timer: 1.5, y: LOGICAL_HEIGHT / 2 });
                  state.effects.push({ type: 'eval_text_warp', text: 'FANTASTIC', color: '#facc15', timer: 1.5, y: LOGICAL_HEIGHT / 2 });
              }
          } else if (blocksDestroyed >= 7) {
              evalText = 'EXCELLENT';
              evalColor = '#10b981'; // Emerald Green
          } else if (blocksDestroyed >= 5) {
              evalText = 'AMAZING';
              evalColor = '#c084fc'; // Purple
          } else if (blocksDestroyed >= 3) {
              evalText = 'GREAT';
              evalColor = '#3b82f6'; // Blue
          } else if (blocksDestroyed >= 1) {
              evalText = 'GOOD';
              evalColor = '#34d399'; // Green
          }

          if (evalText !== '') {
              state.effects.push({ type: 'eval_text', text: evalText, color: evalColor, timer: 1.5, y: LOGICAL_HEIGHT / 2 });
          }

          if (state.status === 'WARPING') {
             state.items = []; // Items fly away due to warp
          } else if (state.status === 'ABILITY_SELECT') {
             // 完全にロック（ポーズ）状態を維持。アビリティ確定までステージ進行を停止する。
          } else {
             state.score += 1;
             if (state.score > 0 && state.score % 50 === 49) {
                 state.bossWarningTimer = 2.0;
                 state.bossWarningText = 'BOSS INCOMING';
             } else if (state.score > 0 && state.score % 50 === 0) {
                 state.bossWarningTimer = 2.0;
                 state.bossWarningText = 'BOSS APPEARED!';
             }
             state.ballsTotal += state.addedBallsNextTurn;
             state.addedBallsNextTurn = 0;

             if (state.score > highScore) {
                highScore = state.score;
                storage.setItem('dinoHighScore', highScore);
             }

             state.startX = state.firstReturnX !== null ? state.firstReturnX : state.startX;
             
             let gameOver = false;
             state.blocks = state.blocks.map(b => {
               if (b.row + 1 >= GRID_ROWS - 1) gameOver = true;
               
               let newShield = b.shield;
               if (newShield) {
                   if (b.row + 1 === GRID_ROWS - 1) {
                       newShield = null; // Last row, shield disappears
                   } else {
                       if (b.type.startsWith('boss')) {
                           const sides = ['top', 'right', 'bottom', 'left'];
                           newShield = sides[Math.floor(Math.random() * sides.length)];
                       } else {
                           const nextShield = { 'top': 'right', 'right': 'bottom', 'bottom': 'left', 'left': 'top' };
                           newShield = nextShield[newShield];
                       }
                   }
               }
               let newCol = b.col;
               if (b.type.startsWith('boss')) {
                   const slide = Math.floor(Math.random() * 3) - 1;
                   newCol += slide;
                   if (newCol < 0) newCol = 0;
                   if (newCol > GRID_COLS - (b.width || 1)) newCol = GRID_COLS - (b.width || 1);
               }
               
               return { ...b, row: b.row + 1, col: newCol, shield: newShield, isTransparent: b.type === 'ghost' ? !b.isTransparent : false };
             });
             state.items = state.items.filter(i => !i.collected && !i.triggered).map(i => {
                return { ...i, row: i.row + 1 };
             });

             if (gameOver) {
               state.status = 'GAME_OVER';
               storage.removeItem('dinoSaveState'); // Clear save on death
               
               const currentEntry = { name: state.username, score: state.score, timestamp: Date.now() };
               leaderboard.push(currentEntry);
               leaderboard.sort((a, b) => b.score - a.score);
               if (leaderboard.length > 100) leaderboard = leaderboard.slice(0, 100);
               storage.setItem('dinoLeaderboard', JSON.stringify(leaderboard));
               state.lastPlayTimestamp = currentEntry.timestamp;
               
               updateUI();
             } else {
               const newRow = generateRow(0, state.score);
               state.blocks.push(...newRow.blocks);
               state.items.push(...newRow.items);
               state.status = 'AIMING';
               state.balls = [];
               state.firstReturnX = null;
                
                storage.setItem('dinoSaveState', JSON.stringify({
                    score: state.score,
                    ballsTotal: state.ballsTotal,
                    blocks: state.blocks,
                    items: state.items,
                    abilities: state.abilities,
                    startX: state.startX
                }));
              }
             updateUI();
          }
        }
      }
    };

    let lastTime = performance.now();
    updateUI();

    const drawDino = (ctx, x, y, isOpen, scale = 1.0) => {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        
        const bodyColor = '#2dd4bf'; // Teal
        const hornColor = '#fff';

        // Spikes on back (drawn behind body)
        ctx.fillStyle = hornColor;
        ctx.beginPath();
        ctx.moveTo(-22, -10); ctx.lineTo(-35, -20); ctx.lineTo(-15, -20);
        ctx.moveTo(-28, 5); ctx.lineTo(-40, -5); ctx.lineTo(-25, -2);
        ctx.moveTo(22, -10); ctx.lineTo(35, -20); ctx.lineTo(15, -20);
        ctx.moveTo(28, 5); ctx.lineTo(40, -5); ctx.lineTo(25, -2);
        ctx.fill();

        // Body (Gumdrop shape)
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.arc(0, -5, 32, Math.PI, 0); // Top arc
        ctx.rect(-32, -5, 64, 35); // Lower rectangle
        ctx.fill();

        // Top Horns
        ctx.fillStyle = hornColor;
