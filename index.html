        ctx.beginPath();
        ctx.moveTo(-15, -32); ctx.lineTo(-20, -45); ctx.lineTo(-5, -35); // Left horn
        ctx.moveTo(15, -32); ctx.lineTo(20, -45); ctx.lineTo(5, -35); // Right horn
        ctx.fill();

        // Eyes (Big Ovals)
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(-12, -10, 9, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(12, -10, 9, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0f172a'; // Pupil looking forward
        ctx.beginPath(); ctx.ellipse(-12, -12, 4, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(12, -12, 4, 6, 0, 0, Math.PI*2); ctx.fill();

        // Mouth
        ctx.fillStyle = '#1e1b4b'; // dark mouth interior
        ctx.beginPath();
      if (isOpen) {
        // Aiming - big open mouth
        ctx.arc(0, 12, 16, 0, Math.PI, false);
        ctx.fill();
      } else {
        // Smiling mouth
        ctx.arc(0, 10, 12, 0, Math.PI, false);
        ctx.fill();
        // Tooth (white square on bottom)
        ctx.fillStyle = '#fff';
        ctx.fillRect(-5, 17, 10, 5);
      }

      ctx.restore();
    };

    const drawLightningIcon = (ctx, x, y, isHorizontal) => {
        ctx.save();
        ctx.translate(x, y);
        if (isHorizontal) ctx.rotate(Math.PI / 2);
        ctx.scale(1.5, 1.5);
        ctx.beginPath();
        ctx.moveTo(2, -6);
        ctx.lineTo(-4, 0);
        ctx.lineTo(0, 0);
        ctx.lineTo(-2, 6);
        ctx.lineTo(4, -1);
        ctx.lineTo(0, -1);
        ctx.closePath();
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#60a5fa'; // Light blue glow
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    };

    const drawItemOrb = (ctx, type, time = 0) => {
        if (type === 'thunder_v' || type === 'thunder_h') {
             ctx.fillStyle = `rgba(56, 189, 248, ${0.4 + Math.random() * 0.4})`;
             ctx.beginPath(); ctx.arc(0, 0, 22 + Math.random() * 4, 0, Math.PI * 2); ctx.fill();
             
             ctx.strokeStyle = '#fff';
             ctx.lineWidth = 1.5;
             ctx.lineCap = 'round';
             ctx.lineJoin = 'round';
             ctx.beginPath();
             
             // Draw realistic erratic sparks
             const drawSpark = (angle) => {
                 let cx = Math.cos(angle) * 10;
                 let cy = Math.sin(angle) * 10;
                 ctx.moveTo(cx, cy);
                 const maxLen = 15 + Math.random() * 15;
                 const segments = 6;
                 let currentAngle = angle;
                 for (let j = 0; j < segments; j++) {
                     currentAngle += (Math.random() - 0.5) * 2.0; // erratic sharp turns
                     const step = maxLen / segments;
                     cx += Math.cos(currentAngle) * step;
                     cy += Math.sin(currentAngle) * step;
                     ctx.lineTo(cx, cy);
                 }
             };

             for(let i=0; i<4; i++) {
                 drawSpark(Math.random() * Math.PI * 2);
             }
             ctx.stroke();

             ctx.fillStyle = '#bae6fd';
             ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
             drawLightningIcon(ctx, 0, 0, type === 'thunder_h');
        } else if (type === 'split') {
             ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
             ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
             
             ctx.fillStyle = '#e0f2fe';
             ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.fill();
             
             ctx.strokeStyle = '#0369a1';
             ctx.lineWidth = 3.5;
             ctx.lineCap = 'round';
             ctx.lineJoin = 'round';
             ctx.beginPath();
             
             // Down arrow
             ctx.moveTo(0, 1); ctx.lineTo(0, 8);
             ctx.moveTo(-4, 4); ctx.lineTo(0, 8); ctx.lineTo(4, 4);
             
             // Top left arrow
             ctx.moveTo(0, -1); ctx.lineTo(-7, -7);
             ctx.moveTo(-3, -8); ctx.lineTo(-8, -8); ctx.lineTo(-8, -3);
             
             // Top right arrow
             ctx.moveTo(0, -1); ctx.lineTo(7, -7);
             ctx.moveTo(3, -8); ctx.lineTo(8, -8); ctx.lineTo(8, -3);
             
             ctx.stroke();
        } else if (type === 'coin') {
             ctx.fillStyle = 'rgba(250, 204, 21, 0.4)';
             ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
             
             ctx.fillStyle = '#fde047';
             ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
             
             ctx.fillStyle = '#854d0e';
             ctx.font = '900 22px "Nunito", sans-serif';
             ctx.textAlign = 'center';
             ctx.textBaseline = 'middle';
             ctx.fillText("$", 0, 2);
        } else {
             ctx.fillStyle = 'rgba(52, 211, 153, 0.3)';
             ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
             
             ctx.fillStyle = '#a7f3d0';
             ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
             
             if (type === 'add_ball') {
                 ctx.fillStyle = '#064e3b';
                 ctx.font = 'bold 24px "Nunito", sans-serif';
                 ctx.textAlign = 'center';
                 ctx.textBaseline = 'middle';
                 ctx.fillText("+", 0, 2);
             }
        }
    };

    const render = (time) => {
      const dt = Math.min((time - lastTime) / 1000, 0.05); 
      lastTime = time;

      const steps = 5;
      const subDt = dt / steps;
      for (let i = 0; i < steps; i++) {
        tick(subDt, time);
      }

      // Background Gradient
      const grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_HEIGHT);
      grad.addColorStop(0, '#0f172a');
      grad.addColorStop(0.5, '#1e1b4b');
      grad.addColorStop(1, '#4c1d95');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      for(let i=0; i<30; i++) {
          const sx = (Math.sin(i * 123) * 0.5 + 0.5) * LOGICAL_WIDTH;
          const sy = (Math.cos(i * 321) * 0.5 + 0.5) * (LOGICAL_HEIGHT - 300);
          const r = Math.abs(Math.sin(time / 1000 + i)) * 2;
          ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
      }

      // Mountains
      ctx.fillStyle = 'rgba(2, 6, 23, 0.7)';
      ctx.beginPath();
      ctx.moveTo(0, LOGICAL_HEIGHT);
      ctx.lineTo(0, LOGICAL_HEIGHT - 120);
      ctx.lineTo(80, LOGICAL_HEIGHT - 220);
      ctx.lineTo(200, LOGICAL_HEIGHT - 100);
      ctx.lineTo(350, LOGICAL_HEIGHT - 250);
      ctx.lineTo(500, LOGICAL_HEIGHT - 80);
      ctx.lineTo(650, LOGICAL_HEIGHT - 180);
      ctx.lineTo(700, LOGICAL_HEIGHT - 120);
      ctx.lineTo(700, LOGICAL_HEIGHT);
      ctx.fill();

      // Aiming Line (Laser pointer)
      if (state.status === 'AIMING' && state.targetPoint) {
          const aim = getClampedAimDir(state.startX, state.targetPoint.x, state.targetPoint.y);
          
          if (Math.hypot(aim.dx, aim.dy) >= 10) {
              const length = 2000;
              const dist = Math.hypot(aim.dx, aim.dy);
              const dirX = aim.dirX;
              const dirY = aim.dirY;
              
              ctx.beginPath();
              ctx.moveTo(state.startX, FLOOR_Y);
              ctx.lineTo(state.startX + dirX * length, FLOOR_Y + dirY * length);
              ctx.strokeStyle = 'rgba(216, 180, 254, 0.7)';
              ctx.lineWidth = 6;
              ctx.setLineDash([20, 15]);
              ctx.stroke();
              ctx.setLineDash([]);
              
              ctx.beginPath();
              ctx.arc(state.startX + dirX * Math.min(dist, length), FLOOR_Y + dirY * Math.min(dist, length), 15, 0, Math.PI*2);
              ctx.strokeStyle = '#fff';
              ctx.lineWidth = 3;
              ctx.stroke();
          }
      }

      // Draw dotted floor
      ctx.beginPath();
      ctx.moveTo(0, DOTTED_LINE_Y);
      ctx.lineTo(LOGICAL_WIDTH, DOTTED_LINE_Y);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; // Increased opacity
      ctx.lineWidth = 3; // Increased thickness
      ctx.setLineDash([15, 10]);
      ctx.stroke();
      ctx.setLineDash([]);

      state.particles.forEach(p => {
          ctx.save();
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      });

      // Items
      const floatOffset = Math.sin(time / 200) * 5;
      state.items.forEach(item => {
         if (item.collected) return;
         const x = item.col * BLOCK_SIZE + BLOCK_SIZE / 2;
         const y = item.row * BLOCK_SIZE + BLOCK_SIZE / 2 + floatOffset;
         
         ctx.save();
         ctx.translate(x, y);
         drawItemOrb(ctx, item.type, time);
         ctx.restore();
      });

      // Blocks
      state.blocks.forEach(block => {
        const x = block.col * BLOCK_SIZE;
        const y = block.row * BLOCK_SIZE;
        const margin = 3;
        const blockWidth = block.width || 1;
        const sizeW = BLOCK_SIZE * blockWidth - margin * 2;
        const sizeH = BLOCK_SIZE - margin * 2;
        
        ctx.save();
        if (block.isTransparent) {
           ctx.globalAlpha = 0.3;
        }

        let mainColor, highlightColor;
        if (block.type === 'iron') {
           mainColor = '#64748b'; highlightColor = '#94a3b8';
        } else if (block.type === 'boss_iron') {
           mainColor = '#475569'; highlightColor = '#94a3b8';
        } else if (block.type === 'boss_muddy') {
           mainColor = '#4d7c0f'; highlightColor = '#84cc16';
        } else if (block.type === 'boss') {
           mainColor = '#ef4444'; highlightColor = '#fca5a5';
        } else if (block.type === 'muddy' || block.type === 'slime') {
           mainColor = '#65a30d'; highlightColor = '#84cc16';
        } else if (block.type === 'ghost') {
           mainColor = '#a855f7'; highlightColor = '#c084fc';
        } else if (block.type === 'shield') {
           mainColor = '#eab308'; highlightColor = '#fde047';
        } else {
           const ratio = Math.max(0, Math.min(1, (block.hp - 1) / 49)); 
           const hue = 240 - ratio * 240; 
           mainColor = `hsl(${hue}, 70%, 45%)`;
           highlightColor = `hsl(${hue}, 80%, 60%)`;
        }
        
        const drawShape = () => {
            ctx.beginPath();
            if (block.shape === 'square' || !block.shape) {
                ctx.roundRect(x + margin, y + margin, sizeW, sizeH, 8);
            } else if (block.shape === 'triangle_tl') {
                ctx.moveTo(x + margin, y + margin);
                ctx.lineTo(x + sizeW + margin, y + margin);
                ctx.lineTo(x + margin, y + sizeH + margin);
                ctx.closePath();
            } else if (block.shape === 'triangle_tr') {
                ctx.moveTo(x + margin, y + margin);
                ctx.lineTo(x + sizeW + margin, y + margin);
                ctx.lineTo(x + sizeW + margin, y + sizeH + margin);
                ctx.closePath();
            } else if (block.shape === 'triangle_bl') {
                ctx.moveTo(x + margin, y + margin);
                ctx.lineTo(x + margin, y + sizeH + margin);
                ctx.lineTo(x + sizeW + margin, y + sizeH + margin);
                ctx.closePath();
            } else if (block.shape === 'triangle_br') {
                ctx.moveTo(x + sizeW + margin, y + margin);
                ctx.lineTo(x + sizeW + margin, y + sizeH + margin);
                ctx.lineTo(x + margin, y + sizeH + margin);
                ctx.closePath();
            }
        };

        if (block.type === 'iron') {
            const grad = ctx.createLinearGradient(x + margin, y + margin, x + sizeW + margin, y + sizeH + margin);
            grad.addColorStop(0, highlightColor);
            grad.addColorStop(0.5, mainColor);
            grad.addColorStop(1, '#334155');
            ctx.fillStyle = grad;
            drawShape();
            ctx.fill();
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = '#cbd5e1';
            const boltRadius = 3;
            ctx.beginPath(); ctx.arc(x + margin + 8, y + margin + 8, boltRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + margin + sizeW - 8, y + margin + 8, boltRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + margin + 8, y + margin + sizeH - 8, boltRadius, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + margin + sizeW - 8, y + margin + sizeH - 8, boltRadius, 0, Math.PI*2); ctx.fill();
        } else if (block.type.startsWith('boss')) {
            if (block.type === 'boss_iron') {
                const grad = ctx.createLinearGradient(x + margin, y + margin, x + sizeW + margin, y + sizeH + margin);
                grad.addColorStop(0, highlightColor);
                grad.addColorStop(0.5, mainColor);
                grad.addColorStop(1, '#1e293b');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x + margin, y + margin, sizeW, sizeH, 16);
                ctx.fill();
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                ctx.fillStyle = '#cbd5e1';
                const boltRadius = 4;
                ctx.beginPath(); ctx.arc(x + margin + 12, y + margin + 12, boltRadius, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + sizeW - 12, y + margin + 12, boltRadius, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + 12, y + margin + sizeH - 12, boltRadius, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + sizeW - 12, y + margin + sizeH - 12, boltRadius, 0, Math.PI*2); ctx.fill();
            } else if (block.type === 'boss_muddy') {
                const grad = ctx.createRadialGradient(x + margin + sizeW/2, y + margin + sizeH/2, 10, x + margin + sizeW/2, y + margin + sizeH/2, sizeW);
                grad.addColorStop(0, highlightColor);
                grad.addColorStop(1, mainColor);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x + margin, y + margin, sizeW, sizeH, 16);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.arc(x + margin + 20, y + margin + 25, 8, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + sizeW - 25, y + margin + 40, 12, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + sizeW/2, y + margin + sizeH - 20, 10, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = mainColor;
                ctx.beginPath();
                ctx.roundRect(x + margin, y + margin, sizeW, sizeH, 16);
                ctx.fill();
            }
            
            // Spikes on back
            ctx.fillStyle = highlightColor;
            ctx.beginPath(); ctx.moveTo(x + margin, y + margin + 15); ctx.lineTo(x + margin - 15, y + margin + 35); ctx.lineTo(x + margin, y + margin + 55); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x + margin, y + margin + 45); ctx.lineTo(x + margin - 18, y + margin + 65); ctx.lineTo(x + margin, y + margin + 85); ctx.fill();
            
            // Eye
            ctx.fillStyle = block.type === 'boss_muddy' ? '#3f6212' : '#7f1d1d';
            ctx.beginPath(); ctx.arc(x + margin + sizeW * 0.65, y + margin + sizeH * 0.35, 12, 0, Math.PI*2); ctx.fill();
            
            // Angry eyebrow
            ctx.lineWidth = 5; ctx.strokeStyle = block.type === 'boss_muddy' ? '#3f6212' : '#7f1d1d'; ctx.beginPath(); ctx.moveTo(x + margin + sizeW * 0.55, y + margin + sizeH * 0.25); ctx.lineTo(x + margin + sizeW * 0.75, y + margin + sizeH * 0.30); ctx.stroke();
            
            // Teeth
            ctx.fillStyle = block.type === 'boss_muddy' ? '#3f6212' : '#7f1d1d';
            ctx.beginPath(); 
            ctx.moveTo(x + margin + sizeW * 0.65, y + margin + sizeH); 
            ctx.lineTo(x + margin + sizeW * 0.75, y + margin + sizeH - 18); 
            ctx.lineTo(x + margin + sizeW * 0.85, y + margin + sizeH); 
            ctx.lineTo(x + margin + sizeW * 0.95, y + margin + sizeH - 18); 
            ctx.lineTo(x + margin + sizeW, y + margin + sizeH); 
            ctx.fill();
        } else if (block.type === 'muddy' || block.type === 'slime') {
            const grad = ctx.createRadialGradient(x + margin + sizeW/2, y + margin + sizeH/2, 5, x + margin + sizeW/2, y + margin + sizeH/2, sizeW);
            grad.addColorStop(0, highlightColor);
            grad.addColorStop(1, mainColor);
            ctx.fillStyle = grad;
            drawShape();
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath(); ctx.arc(x + margin + 10, y + margin + 15, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + margin + sizeW - 12, y + margin + 25, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + margin + sizeW/2, y + margin + sizeH - 10, 5, 0, Math.PI*2); ctx.fill();

        } else {
            const grad = ctx.createLinearGradient(x + margin, y + margin, x + sizeW + margin, y + sizeH + margin);
            grad.addColorStop(0, highlightColor);
            grad.addColorStop(1, mainColor);
            ctx.fillStyle = grad;
            drawShape();
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Details
            if (block.type === 'ghost') {
                ctx.fillStyle = '#e9d5ff';
                ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.arc(x + margin + sizeW * 0.3, y + margin + sizeH * 0.3, 8, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x + margin + sizeW * 0.7, y + margin + sizeH * 0.7, 10, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = block.isTransparent ? 0.3 : 1.0;
            } else if (block.shape === 'square' || !block.shape) {
                // Shiny top inner bevel
                ctx.fillStyle = highlightColor;
                ctx.beginPath();
                ctx.moveTo(x + margin + 8, y + margin + 8);
                ctx.lineTo(x + sizeW + margin - 8, y + margin + 8);
                ctx.lineTo(x + sizeW + margin - 15, y + margin + 18);
                ctx.lineTo(x + margin + 15, y + margin + 18);
                ctx.fill();
            } else {
                ctx.fillStyle = highlightColor;
                ctx.globalAlpha = 0.5;
                drawShape();
                ctx.fill();
                ctx.globalAlpha = block.isTransparent ? 0.3 : 1.0;
            }
        }

        // White flash when hit
        if (block.hitTimer > 0) {
           const flashAlpha = (block.hitTimer / 0.1) * 0.5;
           ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
           drawShape();
           ctx.fill();
        }

        let tx = x + (BLOCK_SIZE * blockWidth) / 2;
        let ty = y + BLOCK_SIZE / 2;
        let fontSize = 28;
        
        if (block.shape && block.shape !== 'square') {
            fontSize = 22;
            if (block.shape === 'triangle_tl') { tx = x + BLOCK_SIZE * 0.35; ty = y + BLOCK_SIZE * 0.35; }
            else if (block.shape === 'triangle_tr') { tx = x + BLOCK_SIZE * 0.65; ty = y + BLOCK_SIZE * 0.35; }
            else if (block.shape === 'triangle_bl') { tx = x + BLOCK_SIZE * 0.35; ty = y + BLOCK_SIZE * 0.65; }
            else if (block.shape === 'triangle_br') { tx = x + BLOCK_SIZE * 0.65; ty = y + BLOCK_SIZE * 0.65; }
        }

        ctx.font = `bold ${fontSize}px "Nunito", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 4;
        
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.lineWidth = 3;
        ctx.strokeText(block.hp.toString(), tx, ty);
        
        ctx.fillStyle = '#fff';
        ctx.fillText(block.hp.toString(), tx, ty);
        ctx.shadowBlur = 0;
        
        if (block.shield) {
            const L = x + margin;
            const R = x + margin + sizeW;
            const T = y + margin;
            const B = y + margin + sizeH;
            const thick = 12;

            let rx, ry, rw, rh;
            if (block.shield === 'top') { rx = L; ry = T; rw = sizeW; rh = thick; }
            else if (block.shield === 'right') { rx = R - thick; ry = T; rw = thick; rh = sizeH; }
            else if (block.shield === 'bottom') { rx = L; ry = B - thick; rw = sizeW; rh = thick; }
            else if (block.shield === 'left') { rx = L; ry = T; rw = thick; rh = sizeH; }

            const grad = ctx.createLinearGradient(rx, ry, rx + rw, ry + rh);
            grad.addColorStop(0, '#93c5fd');
            grad.addColorStop(0.5, '#3b82f6');
            grad.addColorStop(1, '#1e3a8a');
            
            ctx.fillStyle = grad;
            ctx.fillRect(rx, ry, rw, rh);
            
            ctx.strokeStyle = '#bfdbfe';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(rx, ry, rw, rh);
            
            ctx.fillStyle = '#60a5fa';
            const br = 2.5;
            if (block.shield === 'top' || block.shield === 'bottom') {
                ctx.beginPath(); ctx.arc(rx + 8, ry + rh/2, br, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(rx + rw - 8, ry + rh/2, br, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); ctx.arc(rx + rw/2, ry + 8, br, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(rx + rw/2, ry + rh - 8, br, 0, Math.PI*2); ctx.fill();
            }
        }

        ctx.restore();
      });

      if (state.status === 'WARPING') {
          state.warpBlocks.forEach(b => {
              ctx.save();
              ctx.translate(b.x, b.y);
              
              if (b.isItem) {
                  drawItemOrb(ctx, b.type, time);
              } else {
                  ctx.fillStyle = b.color;
                  ctx.beginPath();
                  ctx.roundRect(-BLOCK_SIZE/2 + 2, -BLOCK_SIZE/2 + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4, 8);
                  ctx.fill();
                  
                  ctx.fillStyle = 'rgba(255,255,255,0.2)';
                  ctx.beginPath();
                  ctx.roundRect(-BLOCK_SIZE/2 + 2, -BLOCK_SIZE/2 + 2, BLOCK_SIZE - 4, (BLOCK_SIZE - 4)/2, 8);
                  ctx.fill();

                  ctx.fillStyle = '#fff';
                  ctx.font = 'bold 24px "Nunito", sans-serif';
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.shadowColor = 'rgba(0,0,0,0.5)';
                  ctx.shadowBlur = 4;
                  ctx.fillText(b.hp, 0, 0);
              }
              
              ctx.restore();
          });
      }

      // Render Thunder Effects
      state.effects.forEach(eff => {
          let alpha = eff.timer / 0.4;
          if (eff.type === 'thunder_v' || eff.type === 'thunder_h') alpha = eff.timer / 0.8;
          else if (eff.type === 'warp_lightning' || eff.type === 'eval_text') alpha = eff.timer / 1.5;
          else if (eff.type === 'damage_popup') alpha = eff.timer / 0.6;
          
          ctx.save();
          if (eff.type === 'thunder_v' || eff.type === 'thunder_h') {
              const drawLightning = (x1, y1, x2, y2, color, width, glow) => {
                  ctx.strokeStyle = color;
                  ctx.lineWidth = width;
                  ctx.lineCap = 'round';
                  ctx.lineJoin = 'round';
                  ctx.shadowColor = color;
                  ctx.shadowBlur = glow;
                  ctx.beginPath();
                  ctx.moveTo(x1, y1);
                  const segments = 20;
                  for (let i = 1; i <= segments; i++) {
                      let t = i / segments;
                      let mx = x1 + (x2 - x1) * t;
                      let my = y1 + (y2 - y1) * t;
                      if (i < segments) {
                          const offset = (Math.random() - 0.5) * 60; // Jagged jitter
                          if (eff.type === 'thunder_v') mx += offset;
                          else my += offset;
                      }
                      ctx.lineTo(mx, my);
                  }
                  ctx.stroke();
              };

              const startX = eff.type === 'thunder_v' ? eff.x : 0;
              const startY = eff.type === 'thunder_h' ? eff.y : 0;
              const endX = eff.type === 'thunder_v' ? eff.x : LOGICAL_WIDTH;
              const endY = eff.type === 'thunder_h' ? eff.y : LOGICAL_HEIGHT;

              // Draw multiple bolts
              for (let j = 0; j < 3; j++) {
                  drawLightning(startX, startY, endX, endY, `rgba(56, 189, 248, ${alpha * 0.8})`, 8, 30);
                  drawLightning(startX, startY, endX, endY, `rgba(255, 255, 255, ${alpha})`, 3, 10);
              }
          } else if (eff.type === 'eval_text') {
              const p = eff.timer / 1.5; // 1 to 0
              const scale = p > 0.8 ? 1.0 + (p - 0.8) * 5 : 1.0; 
              const textAlpha = p < 0.2 ? p / 0.2 : 1;
              const yOffset = p < 0.5 ? (0.5 - p) * -50 : 0;
              
              ctx.translate(LOGICAL_WIDTH / 2, eff.y + yOffset);
              ctx.scale(scale, scale);
              ctx.globalAlpha = textAlpha;
              
              ctx.fillStyle = eff.color;
              ctx.font = '900 60px "Nunito", sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              
              ctx.shadowColor = eff.color;
              ctx.shadowBlur = 20;
              ctx.fillText(eff.text, 0, 0);
              
              ctx.fillStyle = '#fff';
              ctx.shadowBlur = 0;
              ctx.fillText(eff.text, 0, 0);
          } else if (eff.type === 'eval_text_warp') {
              const p = eff.timer / 1.5; 
              const scale = p > 0.8 ? 1.0 + (p - 0.8) * 5 : (p < 0.2 ? 1.0 - (0.2 - p) * 2 : 1.0); 
              const textAlpha = p < 0.2 ? p / 0.2 : 1;
              
              ctx.translate(LOGICAL_WIDTH / 2, eff.y);
              ctx.scale(scale, scale);
              ctx.globalAlpha = textAlpha;
              
              ctx.fillStyle = eff.color;
              ctx.font = '900 60px "Nunito", sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              
              ctx.shadowColor = eff.color;
              ctx.shadowBlur = 30;
              ctx.fillText(eff.text, 0, 0);
              
              ctx.fillStyle = '#fff';
              ctx.shadowBlur = 0;
              ctx.fillText(eff.text, 0, 0);
              
              ctx.font = '900 30px "Nunito", sans-serif';
              ctx.fillStyle = '#fef08a';
              ctx.fillText("+10 STAGES SKIP!", 0, 50);
          } else if (eff.type === 'warp_lightning') {
              const p = eff.timer / 1.5;
              const alpha = p < 0.2 ? p / 0.2 : 1;
              const mainColor = eff.isBoss ? '244, 63, 94' : '56, 189, 248';
              for (let i = 0; i < (eff.isBoss ? 5 : 3); i++) {
                 const yOffset = (Math.random() - 0.5) * (eff.isBoss ? 150 : 60);
                 ctx.strokeStyle = `rgba(${mainColor}, ${alpha * (eff.isBoss ? 1.0 : 0.8)})`;
                 ctx.lineWidth = 10 + Math.random() * 10;
                 ctx.beginPath(); 
                 ctx.moveTo(0, eff.y + yOffset); 
                 ctx.lineTo(LOGICAL_WIDTH, eff.y + yOffset + (Math.random()-0.5)*20); 
                 ctx.stroke();
                 
                 ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                 ctx.lineWidth = 4;
                 ctx.stroke();
              }
          } else if (eff.type === 'damage_popup') {
               const p = eff.timer / 0.6;
               ctx.translate(eff.x, eff.y - (1 - p) * 50); // Float up
               ctx.scale(eff.scale, eff.scale);
               ctx.globalAlpha = p < 0.2 ? p / 0.2 : 1;
               ctx.fillStyle = eff.color ? eff.color : (eff.isBlue ? '#60a5fa' : '#fef08a');
               ctx.font = '900 24px "Nunito", sans-serif';
               ctx.textAlign = 'center';
               ctx.textBaseline = 'middle';
               ctx.shadowColor = eff.color ? eff.color : (eff.isBlue ? '#3b82f6' : '#eab308');
               ctx.shadowBlur = 10;
               ctx.fillText(eff.text, 0, 0);
           }
          ctx.restore();
      });
      // Remove finished effects
      state.effects = state.effects.filter(e => e.timer > 0);
      state.effects.forEach(e => e.timer -= (time - lastTime)/1000 || dt); // Ensure correct timing subtraction

      // Dinosaur Launcher
      if (state.status !== 'START_SCREEN') {
         const isAiming = state.status === 'AIMING';
         const dinoScale = isAiming ? 1.0 + Math.sin(time / 200) * 0.05 : 1.0; // Breathing animation
         drawDino(ctx, state.startX, LOGICAL_HEIGHT - 30, isAiming, dinoScale);

         if (isAiming) {
             ctx.fillStyle = '#fff';
             ctx.font = '900 24px "Nunito", sans-serif';
             ctx.textAlign = 'center';
             ctx.shadowColor = '#000';
             ctx.shadowBlur = 5;
             ctx.fillText(`x${state.ballsTotal}`, state.startX, LOGICAL_HEIGHT - 80);
             ctx.shadowBlur = 0;
         }
      }

      // Balls & Trails
      if (state.status === 'AIMING') {
          // Do not draw balls when aiming, just the dino text
      } else {
          state.balls.forEach(ball => {
              if (!ball.launched) return;
              
              // Draw Trail
              if (ball.active && ball.history && ball.history.length > 0) {
                  ctx.beginPath();
                  ctx.moveTo(ball.history[0].x, ball.history[0].y);
                  for(let k=1; k<ball.history.length; k++){
                     ctx.lineTo(ball.history[k].x, ball.history[k].y);
                  }
                  ctx.lineTo(ball.x, ball.y);
                  
                  let trailColor = ball.isLeader ? 'rgba(250, 204, 21, 0.4)' : 'rgba(255, 255, 255, 0.3)';
                  ctx.strokeStyle = trailColor;
                  ctx.lineWidth = ball.isLeader ? BALL_RADIUS * 3 : BALL_RADIUS * 2;
                  ctx.lineCap = 'round';
                  ctx.lineJoin = 'round';
                  ctx.stroke();
              }

              // Draw Ball
              const radius = ball.isLeader ? BALL_RADIUS * 1.5 : BALL_RADIUS;
              
              if (ball.hitCount >= 200) {
                  ctx.fillStyle = '#00AFFF'; // Vivid blue
                  ctx.shadowColor = '#0077FF';
                  ctx.shadowBlur = 20;
              } else if (ball.hitCount >= 100) {
                  ctx.fillStyle = '#FFD700'; // Gold
                  ctx.shadowColor = '#DAA520';
                  ctx.shadowBlur = 15;
              } else if (ball.isLeader) {
                  ctx.fillStyle = '#fef08a';
                  ctx.shadowColor = '#facc15';
                  ctx.shadowBlur = 10;
              } else {
                  ctx.fillStyle = '#fdf4ff';
                  ctx.shadowColor = '#c084fc';
                  ctx.shadowBlur = 10;
              }
              
              ctx.beginPath();
              if (!ball.active) {
                if (ball.destroyed) return;
                const drawX = state.firstReturnX !== null ? state.firstReturnX : ball.x;
                ctx.arc(drawX, LOGICAL_HEIGHT - 20, radius, 0, Math.PI * 2);
              } else {
                ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
              }
              ctx.fill();
              ctx.shadowBlur = 0;
          });
      }

      // Retrieve Balls Button
      if (state.status === 'SHOOTING' || state.status === 'RESOLVING') {
        const btnX = LOGICAL_WIDTH - 45;
        const btnY = LOGICAL_HEIGHT - 45;
        
        ctx.fillStyle = 'rgba(14, 165, 233, 0.8)';
        ctx.strokeStyle = '#7dd3fc';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(btnX, btnY, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px "Nunito", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("DOWN", btnX, btnY - 4);
        
        ctx.beginPath();
        ctx.moveTo(btnX - 8, btnY + 6);
        ctx.lineTo(btnX + 8, btnY + 6);
        ctx.lineTo(btnX, btnY + 16);
        ctx.fill();
      }
      if (state.bossWarningTimer > 0) {
          ctx.save();
          ctx.fillStyle = `rgba(0,0,0,${Math.min(0.7, state.bossWarningTimer)})`;
          ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

          const bannerY = LOGICAL_HEIGHT / 2 - 50;
          ctx.fillStyle = `rgba(236, 72, 153, ${Math.min(0.9, state.bossWarningTimer)})`;
          ctx.fillRect(0, bannerY, LOGICAL_WIDTH, 100);

          ctx.fillStyle = '#fff';
          ctx.font = '900 40px "Nunito", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = '#be185d';
          ctx.shadowBlur = 10;
          
          if (Math.floor(state.bossWarningTimer * 10) % 2 === 0) {
             ctx.fillText(state.bossWarningText === 'BOSS APPEARED!' ? "DANGER!!" : "WARNING!!", LOGICAL_WIDTH / 2, bannerY + 30);
             ctx.fillText(state.bossWarningText || "BOSS INCOMING", LOGICAL_WIDTH / 2, bannerY + 70);
          }
          ctx.restore();
      }

      requestAnimationFrame(render);
    };

    requestAnimationFrame(render);
  </script>
</body>
